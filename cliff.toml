[changelog]
header = "# Changelog\n\n"
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Não lançado]
{% endif %}\
{% set breaking = commits | filter(attribute="breaking", value=true) %}\
{% if breaking %}\
### ⚠ Breaking Changes
{% for commit in breaking %}\
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.breaking_description | default(value=commit.message) | upper_first }}
{% endfor %}
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
protect_breaking_commits = true
tag_pattern = "v[0-9]*"
sort_commits = "newest"

commit_parsers = [
  { message = "^feat", group = "Novas Funcionalidades" },
  { message = "^fix", group = "Correções" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refatoração" },
  { message = "^docs", group = "Documentação" },
  { message = "^chore", skip = true },
  { message = "^test", skip = true },
  { message = "^ci", skip = true },
]
