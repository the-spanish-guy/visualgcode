name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # Permissão para criar releases

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Atualizar versão temporariamente
        run: npm version ${GITHUB_REF_NAME#v} --no-git-tag-version

      - name: Build application
        run: npm run build
      
      - name: Build Windows (sem publicar)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never
      
      - name: Build Linux (sem publicar)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish never
      
      - name: Build macOS (sem publicar)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish never
      
      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            release/*.exe
          retention-days: 5
      
      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            release/*.AppImage
          retention-days: 5
      
      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            release/*.dmg
          retention-days: 5
  
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Atualizar versão
        run: npm version ${GITHUB_REF_NAME#v} --no-git-tag-version

      - name: Atualizar CHANGELOG.md
        run: npx git-cliff -o CHANGELOG.md

      - name: Commit release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore: release ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Gerar notas da release
        run: npx git-cliff --latest -o release-notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          files: |
            windows-installers/*
            linux-installers/*
            macos-installers/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}